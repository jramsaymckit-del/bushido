<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- RETIRED per-user client (INCIDENT 2026-07-02 · A8 URL-retirement brought forward).
     The old per-user URLs (root=James, /chark/ /susan/ /elijah/ /lisa/) each still wrote
     the same users/{uid} doc with a whole-blob save and NO concurrency control — a second
     writer that clobbered newer completions. This stub replaces every one of them with a
     pure redirect to the single consolidated app at /bushido/app/. It contains NO cloud
     code of any kind, so it can never write the doc again. Opening the app signs the same
     account into the SAME users/{uid} data — no data and no access is lost. -->
<meta http-equiv="refresh" content="0; url=/bushido/app/">
<title>BUSHIDO — moved to /app/</title>
<style>
  html,body{height:100%}
  body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Noto Serif JP',serif;text-align:center;padding:40px 24px;color:#2b2622;background:#f4efe6}
  .mark{font-size:44px;color:#cc3529;margin-bottom:16px}
  .msg{font-size:15px;line-height:1.7;max-width:320px}
  a{color:#cc3529}
</style>
<script>
  // Pure redirect: carry any query/hash across to the consolidated app, then leave.
  // No auth, no storage, no cloud — this page cannot touch your data.
  location.replace('/bushido/app/' + location.search + location.hash);
</script>
</head>
<body>
  <div class="mark">武士道</div>
  <div class="msg">BUSHIDO now lives in one place.<br>Taking you to <a href="/bushido/app/">your dashboard</a>…</div>
</body>
</html>
